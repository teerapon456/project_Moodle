<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Cases - ระบบจองรถ (Car Booking)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #1a1a2e;
            font-size: 1.8rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 i {
            color: #764ba2;
        }

        .header p {
            color: #666;
            font-size: 0.95rem;
        }

        .meta-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .meta-item label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 4px;
        }

        .meta-item input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .meta-item input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .summary-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .summary-card .number {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .summary-card .label {
            color: #666;
            font-size: 0.9rem;
        }

        .summary-card.total .number {
            color: #1a1a2e;
        }

        .summary-card.pass .number {
            color: #10b981;
        }

        .summary-card.fail .number {
            color: #ef4444;
        }

        .summary-card.pending .number {
            color: #f59e0b;
        }

        .section {
            background: white;
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .section-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .section-header:hover {
            filter: brightness(1.05);
        }

        .section-header .badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-left: auto;
        }

        .section-content {
            padding: 0;
        }

        .test-case {
            border-bottom: 1px solid #f0f0f0;
            padding: 20px 24px;
            transition: background 0.2s;
        }

        .test-case:last-child {
            border-bottom: none;
        }

        .test-case:hover {
            background: #fafafa;
        }

        .test-case-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 12px;
        }

        .tc-id {
            background: #f0f0f0;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #555;
            white-space: nowrap;
        }

        .tc-title {
            font-weight: 500;
            color: #1a1a2e;
            flex: 1;
        }

        .tc-status {
            display: flex;
            gap: 8px;
        }

        .tc-status label {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .tc-status input[type="radio"] {
            display: none;
        }

        .tc-status label.pass {
            background: #f0fdf4;
            color: #166534;
        }

        .tc-status input[type="radio"]:checked+label.pass {
            background: #10b981;
            color: white;
            border-color: #059669;
        }

        .tc-status label.fail {
            background: #fef2f2;
            color: #991b1b;
        }

        .tc-status input[type="radio"]:checked+label.fail {
            background: #ef4444;
            color: white;
            border-color: #dc2626;
        }

        .tc-status label.pending {
            background: #fffbeb;
            color: #92400e;
        }

        .tc-status input[type="radio"]:checked+label.pending {
            background: #f59e0b;
            color: white;
            border-color: #d97706;
        }

        .tc-details {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-top: 12px;
            font-size: 0.9rem;
        }

        .tc-details h4 {
            color: #666;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .tc-details p,
        .tc-details ul {
            color: #444;
            line-height: 1.6;
        }

        .tc-details ul {
            padding-left: 20px;
        }

        .tc-details ul li {
            margin-bottom: 4px;
        }

        .tc-note {
            margin-top: 12px;
        }

        .tc-note textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 60px;
            transition: all 0.3s;
        }

        .tc-note textarea:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
        }

        .tc-note textarea::placeholder {
            color: #aaa;
        }

        .actions {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-top: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(118, 75, 162, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a1a2e;
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transform: translateX(150%);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: #10b981;
        }

        .toast.error {
            background: #ef4444;
        }

        @media (max-width: 768px) {
            .summary-cards {
                grid-template-columns: repeat(2, 1fr);
            }

            .test-case-header {
                flex-direction: column;
            }

            .tc-status {
                width: 100%;
                justify-content: flex-start;
            }
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .actions,
            .btn {
                display: none !important;
            }

            .section {
                break-inside: avoid;
                box-shadow: none;
                border: 1px solid #ddd;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><i class="ri-file-list-3-line"></i> Test Cases - ระบบจองรถ</h1>
            <p>เอกสารสำหรับบันทึกผลการทดสอบระบบจองรถ (Car Booking System)</p>

            <div class="meta-info">
                <div class="meta-item">
                    <label>ผู้ทดสอบ</label>
                    <input type="text" id="testerName" placeholder="ชื่อผู้ทดสอบ">
                </div>
                <div class="meta-item">
                    <label>วันที่ทดสอบ</label>
                    <input type="date" id="testDate">
                </div>
                <div class="meta-item">
                    <label>เวอร์ชันระบบ</label>
                    <input type="text" id="version" placeholder="v1.0.0">
                </div>
                <div class="meta-item">
                    <label>สภาพแวดล้อม</label>
                    <input type="text" id="environment" placeholder="Development / Staging / Production">
                </div>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="summary-cards">
            <div class="summary-card total">
                <div class="number" id="totalCount">61</div>
                <div class="label">ทั้งหมด</div>
            </div>
            <div class="summary-card pass">
                <div class="number" id="passCount">0</div>
                <div class="label">ผ่าน</div>
            </div>
            <div class="summary-card fail">
                <div class="number" id="failCount">0</div>
                <div class="label">ไม่ผ่าน</div>
            </div>
            <div class="summary-card pending">
                <div class="number" id="pendingCount">61</div>
                <div class="label">รอทดสอบ</div>
            </div>
        </div>

        <!-- Test Cases Sections -->
        <div id="sectionsContainer"></div>

        <!-- Actions -->
        <div class="actions">
            <button class="btn btn-primary" onclick="saveData()">
                <i class="ri-save-line"></i> บันทึกข้อมูล
            </button>
            <button class="btn btn-success" onclick="exportJSON()">
                <i class="ri-file-download-line"></i> Export JSON
            </button>
            <button class="btn btn-danger" onclick="resetAll()">
                <i class="ri-refresh-line"></i> รีเซ็ต
            </button>
            <button class="btn btn-secondary" onclick="window.print()">
                <i class="ri-printer-line"></i> พิมพ์
            </button>
        </div>
    </div>


    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="ri-check-line"></i>
        <span id="toastMessage">บันทึกสำเร็จ</span>
    </div>

    <script>
        // Test Cases Data
        const testCases = [
            {
                section: "1. การสร้างคำขอจองรถ",
                icon: "ri-add-circle-line",
                cases: [
                    { id: "TC-001", title: "สร้างคำขอจองรถสำเร็จ", steps: "1. ล็อกอินเป็น User\n2. กดปุ่ม 'สร้างคำขอใหม่'\n3. กรอกข้อมูลครบถ้วน\n4. กดบันทึก", expected: "แสดงข้อความสำเร็จ, สถานะ 'รอหัวหน้าอนุมัติ', ส่งอีเมล" },
                    { id: "TC-002", title: "สร้างคำขอโดยไม่กรอกปลายทาง", steps: "1. กดสร้างคำขอใหม่\n2. ไม่กรอก 'ปลายทาง'\n3. กดบันทึก", expected: "แสดง error 'กรอกข้อมูลไม่ครบ (destination)'" },
                    { id: "TC-003", title: "สร้างคำขอโดยไม่เลือกผู้อนุมัติ", steps: "1. กดสร้างคำขอใหม่\n2. ไม่เลือกผู้อนุมัติ\n3. กดบันทึก", expected: "แสดง error 'กรอกข้อมูลไม่ครบ (approver_email)'" },
                    { id: "TC-004", title: "สร้างคำขอพร้อมระบุผู้โดยสาร", steps: "1. กรอกข้อมูลครบ\n2. เพิ่มผู้โดยสาร 3 คน\n3. กดบันทึก", expected: "คำขอถูกสร้างพร้อมรายชื่อผู้โดยสาร" },
                    { id: "TC-005", title: "วันเริ่มต้น > วันสิ้นสุด", steps: "1. เลือกวันเริ่ม = 25 ธ.ค.\n2. เลือกวันสิ้นสุด = 22 ธ.ค.\n3. กดบันทึก", expected: "แสดง error การตรวจสอบวันที่" }
                ]
            },
            {
                section: "2. การอนุมัติโดยหัวหน้างาน",
                icon: "ri-user-star-line",
                cases: [
                    { id: "TC-010", title: "หัวหน้าอนุมัติคำขอสำเร็จ", steps: "1. ล็อกอินเป็น Supervisor\n2. เข้าดูคำขอที่รอ\n3. กดอนุมัติ", expected: "สถานะเปลี่ยนเป็น 'รอผู้จัดการอนุมัติ'" },
                    { id: "TC-011", title: "หัวหน้าปฏิเสธคำขอ", steps: "1. กดปฏิเสธ\n2. กรอกเหตุผล\n3. กดยืนยัน", expected: "สถานะเปลี่ยนเป็น 'ปฏิเสธ', บันทึกเหตุผล" },
                    { id: "TC-012", title: "ปฏิเสธโดยไม่ระบุเหตุผล", steps: "1. กดปฏิเสธ\n2. ไม่กรอกเหตุผล\n3. กดยืนยัน", expected: "แสดง error 'กรุณาระบุเหตุผล'" },
                    { id: "TC-013", title: "อนุมัติผ่าน Email Link", steps: "1. คลิกลิงก์อนุมัติจากอีเมล\n2. กดยืนยันอนุมัติ", expected: "สถานะเปลี่ยนเป็น 'รอผู้จัดการอนุมัติ'" }
                ]
            },
            {
                section: "3. การอนุมัติโดยผู้จัดการ",
                icon: "ri-shield-user-line",
                cases: [
                    { id: "TC-020", title: "Manager อนุมัติพร้อมมอบหมายรถ", steps: "1. เลือกคำขอที่รอ\n2. เลือกรถจากรายการ\n3. กดอนุมัติ", expected: "สถานะ 'อนุมัติแล้ว', บันทึกรถที่มอบหมาย" },
                    { id: "TC-021", title: "Manager อนุมัติพร้อม Fleet Card", steps: "1. เลือก 'บัตรเติมน้ำมัน'\n2. เลือกบัตร, ระบุวงเงิน\n3. กดอนุมัติ", expected: "สถานะ 'อนุมัติแล้ว', บันทึก Fleet Card" },
                    { id: "TC-022", title: "Manager ปฏิเสธคำขอ", steps: "1. เลือกคำขอ\n2. กดปฏิเสธพร้อมเหตุผล", expected: "สถานะ 'ปฏิเสธ', ส่งอีเมลแจ้งผู้ขอ" },
                    { id: "TC-023", title: "อนุมัติโดยไม่เลือกรถ/บัตร", steps: "1. กดอนุมัติโดยไม่เลือกทรัพยากร", expected: "แสดง error หรืออนุมัติได้ (ตาม Business Logic)" }
                ]
            },
            {
                section: "4. การยกเลิกคำขอ",
                icon: "ri-close-circle-line",
                cases: [
                    { id: "TC-030", title: "ผู้ขอยกเลิกคำขอที่รอหัวหน้า", steps: "1. เลือกคำขอที่รอ\n2. กดยกเลิก", expected: "สถานะเปลี่ยนเป็น 'ยกเลิก'" },
                    { id: "TC-031", title: "ผู้ขอยกเลิกคำขอที่รอผู้จัดการ", steps: "1. เลือกคำขอสถานะ 'รอผู้จัดการ'\n2. กดยกเลิก", expected: "สถานะเปลี่ยนเป็น 'ยกเลิก'" },
                    { id: "TC-032", title: "Manager เพิกถอนคำขอที่อนุมัติแล้ว", steps: "1. เลือกคำขอ 'อนุมัติแล้ว'\n2. กด Revoke พร้อมเหตุผล", expected: "สถานะ 'ยกเลิก', ส่งอีเมลแจ้ง" },
                    { id: "TC-033", title: "Revoke โดยไม่ระบุเหตุผล", steps: "1. กด Revoke\n2. ไม่กรอกเหตุผล", expected: "แสดง error 'กรุณาระบุเหตุผล'" },
                    { id: "TC-034", title: "ผู้ขอพยายามยกเลิกคำขอที่อนุมัติแล้ว", steps: "1. User เลือกคำขอ 'อนุมัติแล้ว'\n2. พยายามยกเลิก", expected: "ไม่แสดงปุ่มยกเลิก / ไม่สามารถทำได้" }
                ]
            },
            {
                section: "5. การแก้ไขคำขอที่อนุมัติแล้ว",
                icon: "ri-edit-line",
                cases: [
                    { id: "TC-040", title: "แก้ไขวันเวลาของคำขอ", steps: "1. Manager กดแก้ไข\n2. เปลี่ยนวันเวลา\n3. บันทึก", expected: "บันทึกวันเวลาใหม่, ส่งอีเมลแจ้ง" },
                    { id: "TC-041", title: "เปลี่ยนรถที่มอบหมาย", steps: "1. แก้ไขคำขอ\n2. เลือกรถคันใหม่\n3. บันทึก", expected: "บันทึกรถใหม่สำเร็จ" },
                    { id: "TC-042", title: "เปลี่ยนจากรถเป็น Fleet Card", steps: "1. เลือก 'บัตรเติมน้ำมัน'\n2. เลือกบัตร ระบุวงเงิน\n3. บันทึก", expected: "บันทึก Fleet Card แทนรถ" },
                    { id: "TC-043", title: "เพิ่ม/แก้ไขชื่อคนขับ", steps: "1. ระบุชื่อคนขับใหม่\n2. บันทึก", expected: "บันทึกชื่อคนขับสำเร็จ" }
                ]
            },
            {
                section: "6. การจัดการรถ",
                icon: "ri-roadster-line",
                cases: [
                    { id: "TC-050", title: "เพิ่มรถใหม่สำเร็จ", steps: "1. ไปหน้าจัดการรถ\n2. กรอกข้อมูล (ชื่อ, ทะเบียน, ประเภท)\n3. บันทึก", expected: "รถถูกเพิ่มในระบบ" },
                    { id: "TC-051", title: "เพิ่มรถโดยไม่กรอกทะเบียน", steps: "1. ไม่กรอกทะเบียน\n2. บันทึก", expected: "แสดง error 'กรุณาระบุทะเบียนรถ'" },
                    { id: "TC-052", title: "เพิ่มรถด้วยทะเบียนซ้ำ", steps: "1. กรอกทะเบียนที่มีอยู่แล้ว\n2. บันทึก", expected: "แสดง error 'ทะเบียนรถนี้มีอยู่ในระบบแล้ว'" },
                    { id: "TC-053", title: "แก้ไขข้อมูลรถ", steps: "1. เลือกรถ\n2. แก้ไขข้อมูล\n3. บันทึก", expected: "ข้อมูลถูกอัปเดต" },
                    { id: "TC-054", title: "ลบรถที่ไม่มีการจอง", steps: "1. เลือกรถที่ไม่มีการจอง\n2. กดลบ", expected: "รถถูกลบออก" },
                    { id: "TC-055", title: "ลบรถที่มีการจองอยู่", steps: "1. เลือกรถที่มีการจอง\n2. กดลบ", expected: "แสดง error ไม่สามารถลบได้" }
                ]
            },
            {
                section: "7. สิทธิ์การเข้าถึง",
                icon: "ri-lock-line",
                cases: [
                    { id: "TC-060", title: "User ไม่สามารถเข้าหน้าจัดการได้", steps: "1. ล็อกอินเป็น User\n2. พยายามเข้า ?page=manage", expected: "ไม่แสดงเมนู / redirect ออก" },
                    { id: "TC-061", title: "User ไม่สามารถเข้าหน้าจัดการรถ", steps: "1. ล็อกอินเป็น User\n2. พยายามเข้า ?page=cars", expected: "ไม่อนุญาต" },
                    { id: "TC-062", title: "Manager เข้าถึงทุกหน้าได้", steps: "1. ล็อกอินเป็น Manager\n2. เข้าหน้า manage, cars, reports", expected: "สามารถเข้าถึงได้ทุกหน้า" },
                    { id: "TC-063", title: "User ดูเฉพาะคำขอของตัวเอง", steps: "1. ล็อกอินเป็น User\n2. เข้าหน้า bookings", expected: "แสดงเฉพาะคำขอที่สร้างเอง" },
                    { id: "TC-064", title: "Manager ดูคำขอทั้งหมด", steps: "1. ล็อกอินเป็น Manager\n2. เข้าหน้า bookings", expected: "แสดงคำขอของทุกคน" },
                    { id: "TC-065", title: "User พยายามเรียก API อนุมัติ", steps: "1. User เรียก API action=approve", expected: "Error 403 Forbidden" },
                    { id: "TC-066", title: "User พยายามยกเลิกคำขอคนอื่น", steps: "1. User เรียก Cancel ของคนอื่น", expected: "Error คุณไม่มีสิทธิ์" },
                    { id: "TC-067", title: "Supervisor อนุมัติที่ไม่ใช่ของตน", steps: "1. Supervisor A อนุมัติของ Supervisor B", expected: "Error คุณไม่ใช่หัวหน้าที่ระบุไว้" },
                    { id: "TC-068", title: "Manager อนุมัติแทนหัวหน้า", steps: "1. Manager อนุมัติคำขอรอหัวหน้า", expected: "อนุมัติสำเร็จ (Override)" }

            {

                    { id: "TC-073", title: "กรองตามสถานะ", steps: "1. เลือกสถานะจาก dropdown", expected: "แสดงเฉพาะคำขอที่มีสถานะตรงกัน" },
                    { id: "TC-074", title: "ดูปฏิทิน", steps: "1. เข้าหน้า Calendar", expected: "แสดงคำขอในรูปแบบปฏิทิน" },
                    { id: "TC-075", title: "ส่งอีเมลซ้ำ (Resend)", steps: "1. Manager กดส่งอีเมลซ้ำ", expected: "ส่งอีเมลแจ้งเตือนอีกครั้ง" }

            },
            {
                section: "9. การคืนรถ",
                icon: "ri-arrow-go-back-line",

                    { id: "TC-080", title: "ผู้ยืมแจ้งคืนรถสำเร็จ", steps: "1. ล็อกอินเป็น User\n2. เข้าหน้ารายการคำขอ\n3. เลือกคำขอ 'อนุมัติแล้ว' ของตนเอง\n4. กดปุ่ม 'แจ้งคืนรถ' (🔙)\n5. กรอกหมายเหตุ (optional)\n6. กดยืนยัน", expected: "สถานะเปลี่ยนเป็น 'รอยืนยันคืน', แสดงข้อความสำเร็จ" },
                    { id: "TC-081", title: "ผู้ยืมแจ้งคืนคำขอของคนอื่นไม่ได้", steps: "1. ล็อกอินเป็น User A\n2. พยายามแจ้งคืนคำขอของ User B", expected: "ไม่แสดงปุ่มแจ้งคืน / ไม่อนุญาต" },
                    { id: "TC-082", title: "IPCD ยืนยันคืนรถสำเร็จ", steps: "1. ล็อกอินเป็น Manager\n2. เข้าหน้า 'รถที่ยังไม่คืน'\n3. เลือกรายการที่ 'รอยืนยันคืน'\n4. กดปุ่ม 'ยืนยันคืน'\n5. กรอกหมายเหตุ (optional)\n6. กดยืนยัน", expected: "สถานะเปลี่ยนเป็น 'เสร็จสิ้น', บันทึก returned_at" },
                    { id: "TC-083", title: "IPCD ยืนยันคืนโดยตรง (ไม่ผ่านผู้ยืม)", steps: "1. เลือกรายการที่ 'กำลังใช้งาน'\n2. กดยืนยันคืนโดยตรง", expected: "สถานะเปลี่ยนเป็น 'เสร็จสิ้น' ทันที" },
                    { id: "TC-084", title: "รถว่างหลังยืนยันคืน", steps: "1. ยืนยันคืนรถคัน A\n2. สร้างคำขอใหม่ช่วงเวลาเดียวกัน\n3. ดูรายการรถที่ว่าง", expected: "รถคัน A แสดงเป็น 'ว่าง'" },
                    { id: "TC-085", title: "รถยังไม่ว่างถ้ายังไม่คืน", steps: "1. มีคำขอ 'กำลังใช้งาน' ใช้รถคัน B\n2. สร้างคำขอใหม่ช่วงเวลาทับซ้อน\n3. ดูรายการรถ", expected: "รถคัน B แสดงเป็น 'ไม่ว่าง'" },
                    { id: "TC-086", title: "หน้ารถที่ยังไม่คืนแสดงรายการถูกต้อง", steps: "1. เข้าหน้า 'รถที่ยังไม่คืน'", expected: "แสดงเฉพาะคำขอ 'อนุมัติแล้ว', 'กำลังใช้งาน' และ 'รอยืนยันคืน'" },
                    { id: "TC-087", title: "แสดงรายการเกินกำหนดถูกต้อง", steps: "1. มีคำขอ 'กำลังใช้งาน' ที่ end_time ผ่านไปแล้ว\n2. เข้าหน้ารถที่ยังไม่คืน", expected: "แสดงแถวสีแดง พร้อมข้อความ 'เกินกำหนด'" }
                ]
            },
            {
                section: "10. ระบบสถานะ (10 สถานะ)",
                icon: "ri-pulse-line",
                cases: [
                    { id: "TC-090", title: "สถานะเปลี่ยนเป็น 'กำลังใช้งาน' อัตโนมัติ", steps: "1. สร้างคำขอที่ start_time ผ่านแล้ว\n2. อนุมัติคำขอ\n3. รอ 1 นาที แล้ว refresh", expected: "สถานะเปลี่ยนจาก 'อนุมัติแล้ว' → 'กำลังใช้งาน'" },
                    { id: "TC-091", title: "สถานะ 'กำลังใช้งาน' แสดงถูกต้อง", steps: "1. ดูคำขอที่ถึง start_time แล้ว", expected: "แสดง badge สีม่วง 'กำลังใช้งาน'" },
                    { id: "TC-092", title: "หัวหน้าปฏิเสธ = rejected_supervisor", steps: "1. หัวหน้าปฏิเสธคำขอที่รอ", expected: "สถานะ = 'ปฏิเสธ (หัวหน้า)', badge สีแดง" },
                    { id: "TC-093", title: "IPCD ปฏิเสธ = rejected_manager", steps: "1. IPCD ปฏิเสธคำขอที่รอ", expected: "สถานะ = 'ปฏิเสธ (IPCD)', badge สีแดง" },
                    { id: "TC-094", title: "ผู้ขอยกเลิก = cancelled", steps: "1. ผู้ขอยกเลิกคำขอที่รอ", expected: "สถานะ = 'ยกเลิก', badge สีเทา" },
                    { id: "TC-095", title: "IPCD เพิกถอน = revoked", steps: "1. IPCD เพิกถอนคำขอที่อนุมัติแล้ว", expected: "สถานะ = 'เพิกถอน', badge สีน้ำตาล" },
                    { id: "TC-096", title: "แจ้งคืนจาก 'กำลังใช้งาน'", steps: "1. ผู้ยืมกดแจ้งคืนคำขอที่ 'กำลังใช้งาน'", expected: "สถานะเปลี่ยนเป็น 'รอยืนยันคืน'" },
                    { id: "TC-097", title: "กรองตามสถานะใหม่ทั้ง 10", steps: "1. เลือกสถานะจาก dropdown ทีละตัว", expected: "กรองผลลัพธ์ถูกต้อง" },
                    { id: "TC-098", title: "Dashboard นับสถานะถูกต้อง", steps: "1. ดู Dashboard\n2. เช็คตัวเลขแต่ละสถานะ", expected: "จำนวนตรงกับข้อมูลจริง" },
                    { id: "TC-099", title: "Reports นับสถานะถูกต้อง", steps: "1. ดู Reports\n2. เช็คตัวเลข/กราฟ", expected: "จำนวนตรงกับข้อมูลจริง รวม in_use, pending_return" }
                ]
            }
        ];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('testDate').valueAsDate = new Date();
            renderSections();
            loadData();
        });

        // Render all sections
        function renderSections() {
            const container = document.getElementById('sectionsContainer');
            container.innerHTML = testCases.map((section, sIdx) => `
                <div class="section">
                    <div class="section-header" onclick="toggleSection(${sIdx})">
                        <i class="${section.icon}"></i>
                        ${section.section}
                        <span class="badge">${section.cases.length} Test Cases</span>
                    </div>
                    <div class="section-content" id="section-${sIdx}">
                        ${section.cases.map(tc => renderTestCase(tc)).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Render single test case
        function renderTestCase(tc) {
            return `
                <div class="test-case" id="tc-${tc.id}">
                    <div class="test-case-header">
                        <span class="tc-id">${tc.id}</span>
                        <span class="tc-title">${tc.title}</span>
                        <div class="tc-status">
                            <input type="radio" name="status-${tc.id}" id="pass-${tc.id}" value="pass" onchange="updateCounts()">
                            <label for="pass-${tc.id}" class="pass"><i class="ri-check-line"></i> ผ่าน</label>
                            <input type="radio" name="status-${tc.id}" id="fail-${tc.id}" value="fail" onchange="updateCounts()">
                            <label for="fail-${tc.id}" class="fail"><i class="ri-close-line"></i> ไม่ผ่าน</label>
                            <input type="radio" name="status-${tc.id}" id="pending-${tc.id}" value="pending" checked onchange="updateCounts()">
                            <label for="pending-${tc.id}" class="pending"><i class="ri-time-line"></i> รอ</label>
                        </div>
                    </div>
                    <div class="tc-details">
                        <h4><i class="ri-list-check"></i> ขั้นตอนทดสอบ</h4>
                        <p>${tc.steps.replace(/\n/g, '<br>')}</p>
                        <h4 style="margin-top:12px"><i class="ri-checkbox-circle-line"></i> ผลลัพธ์ที่คาดหวัง</h4>
                        <p>${tc.expected}</p>
                    </div>
                    <div class="tc-note">
                        <textarea id="note-${tc.id}" placeholder="บันทึกหมายเหตุ / ปัญหาที่พบ..."></textarea>
                    </div>
                </div>
            `;
        }

        function toggleSection(idx) {
            const section = document.getElementById(`section-${idx}`);
            section.style.display = section.style.display === 'none' ? 'block' : 'none';
        }

        // Update summary counts
        function updateCounts() {
            let pass = 0, fail = 0, pending = 0;
            testCases.forEach(section => {
                section.cases.forEach(tc => {
                    const status = document.querySelector(`input[name="status-${tc.id}"]:checked`)?.value;
                    if (status === 'pass') pass++;
                    else if (status === 'fail') fail++;
                    else pending++;
                });
            });
            document.getElementById('passCount').textContent = pass;
            document.getElementById('failCount').textContent = fail;
            document.getElementById('pendingCount').textContent = pending;
        }

        // Save data to localStorage
        function saveData() {
            const data = {
                meta: {
                    tester: document.getElementById('testerName').value,
                    date: document.getElementById('testDate').value,
                    version: document.getElementById('version').value,
                    environment: document.getElementById('environment').value
                },
                results: {}
            };
            testCases.forEach(section => {
                section.cases.forEach(tc => {
                    data.results[tc.id] = {
                        status: document.querySelector(`input[name="status-${tc.id}"]:checked`)?.value || 'pending',
                        note: document.getElementById(`note-${tc.id}`)?.value || ''
                    };
                });
            });
            localStorage.setItem('carBookingTestCases', JSON.stringify(data));
            showToast('บันทึกข้อมูลสำเร็จ!', 'success');
        }

        // Load data from localStorage
        function loadData() {
            const saved = localStorage.getItem('carBookingTestCases');
            if (!saved) return;
            try {
                const data = JSON.parse(saved);
                if (data.meta) {
                    document.getElementById('testerName').value = data.meta.tester || '';
                    document.getElementById('testDate').value = data.meta.date || '';
                    document.getElementById('version').value = data.meta.version || '';
                    document.getElementById('environment').value = data.meta.environment || '';
                }
                if (data.results) {
                    Object.keys(data.results).forEach(tcId => {
                        const result = data.results[tcId];
                        const radio = document.getElementById(`${result.status}-${tcId}`);
                        if (radio) radio.checked = true;
                        const note = document.getElementById(`note-${tcId}`);
                        if (note) note.value = result.note || '';
                    });
                }
                updateCounts();
            } catch (e) {
                console.error('Error loading data:', e);
            }
        }

        // Export to JSON
        function exportJSON() {
            const data = {
                exportDate: new Date().toISOString(),
                meta: {
                    tester: document.getElementById('testerName').value,
                    date: document.getElementById('testDate').value,
                    version: document.getElementById('version').value,
                    environment: document.getElementById('environment').value
                },
                summary: {
                    total: parseInt(document.getElementById('totalCount').textContent),
                    pass: parseInt(document.getElementById('passCount').textContent),
                    fail: parseInt(document.getElementById('failCount').textContent),
                    pending: parseInt(document.getElementById('pendingCount').textContent)
                },
                results: []
            };
            testCases.forEach(section => {
                section.cases.forEach(tc => {
                    const status = document.querySelector(`input[name="status-${tc.id}"]:checked`)?.value || 'pending';
                    const note = document.getElementById(`note-${tc.id}`)?.value || '';
                    data.results.push({
                        id: tc.id,
                        title: tc.title,
                        section: section.section,
                        status: status,
                        statusText: status === 'pass' ? 'ผ่าน' : status === 'fail' ? 'ไม่ผ่าน' : 'รอทดสอบ',
                        note: note
                    });
                });
            });
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `test_results_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            showToast('Export JSON สำเร็จ!', 'success');
        }

        // Reset all
        function resetAll() {
            if (!confirm('ยืนยันรีเซ็ตข้อมูลทั้งหมด?')) return;
            localStorage.removeItem('carBookingTestCases');
            location.reload();
        }

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>

</html>

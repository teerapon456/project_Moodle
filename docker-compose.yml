version: '3.8'

services:
  # Gateway (Reverse Proxy)
  gateway:
    image: nginx:latest
    container_name: myhr-gateway
    ports:
      - "80:80"
      - "443:443"
      - "8090:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - ./docker/nginx/html:/usr/share/nginx/html:ro
      - ./public:/var/www/html/public:ro
      - ./Modules/HRServices/public/assets:/var/www/html/Modules/HRServices/public/assets:ro
    depends_on:
      - portal
      - moodle
    networks:
      - myhr-net

  # Main Portal Application
  portal:
    build:
      context: .
      dockerfile: docker/Dockerfile.portal
    container_name: myhr-portal
    volumes:
      - ./:/var/www/html
    environment:
      - DB_HOST=${DB_HOST}
      - TZ=Asia/Bangkok
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - myhr-net

  # Portal Database
  db:
    image: mysql:8.4
    container_name: myhr-db
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - TZ=Asia/Bangkok
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - myhr-net

  # Redis for Shared Session
  redis:
    image: redis:alpine
    container_name: myhr-redis
    networks:
      - myhr-net

  # Moodle LMS Application
  moodle:
    build:
      context: .
      dockerfile: docker/Dockerfile.moodle
    container_name: myhr-moodle
    volumes:
      - ./Modules/Moodle:/var/www/html
      - ./docker/moodle/config.php:/var/www/html/config.php
      - moodledata:/var/www/moodledata
    environment:
      - TZ=Asia/Bangkok
      - MOODLE_DB_HOST=${MOODLE_DB_HOST}
      - MOODLE_DB_NAME=${MOODLE_DB_NAME}
      - MOODLE_DB_USER=${MOODLE_DB_USER}
      - MOODLE_DB_PASS=${MOODLE_DB_PASS}
      - MOODLE_WWWROOT=${MOODLE_WWWROOT}
      - REDIS_HOST=redis
      # Access to Portal DB for SSO
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      # SMTP Settings
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_FROM_NAME="INTEQC Moodle"
    depends_on:
      - moodle_db
      - redis
    networks:
      - myhr-net

  # Moodle Database (Separate from Portal)
  moodle_db:
    image: mysql:8.4
    container_name: myhr-moodle-db
    environment:
      - MYSQL_ROOT_PASSWORD=${MOODLE_DB_ROOT_PASSWORD}
      - TZ=Asia/Bangkok
      - MYSQL_DATABASE=${MOODLE_DB_NAME}
      - MYSQL_USER=${MOODLE_DB_USER}
      - MYSQL_PASSWORD=${MOODLE_DB_PASS}
    volumes:
      - moodle_db_data:/var/lib/mysql
    networks:
      - myhr-net

  # phpMyAdmin (Auto-login)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: myhr-phpmyadmin
    environment:
      - PMA_HOSTS=db,moodle_db
      - PMA_USER=${PMA_USER}
      - PMA_PASSWORD=${PMA_PASSWORD}
      - PMA_ARBITRARY=1
    ports:
      - "8081:80"
    networks:
      - myhr-net

  # Moodle Frontend (Next.js)
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        MOODLE_INTERNAL_URL: ${MOODLE_INTERNAL_URL}
        MOODLE_PUBLIC_URL: ${MOODLE_PUBLIC_URL}
        NEXT_PUBLIC_MOODLE_PUBLIC_URL: ${NEXT_PUBLIC_MOODLE_PUBLIC_URL}
        MOODLE_SERVICE_NAME: ${MOODLE_SERVICE_NAME}
        MOODLE_ADMIN_TOKEN: ${MOODLE_ADMIN_TOKEN}
        MOODLE_WS_TOKEN: ${MOODLE_WS_TOKEN}
    container_name: myhr-frontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Bangkok
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - MOODLE_INTERNAL_URL=${MOODLE_INTERNAL_URL}
      - MOODLE_PUBLIC_URL=${MOODLE_PUBLIC_URL}
      - NEXT_PUBLIC_MOODLE_PUBLIC_URL=${NEXT_PUBLIC_MOODLE_PUBLIC_URL}
      - MOODLE_SERVICE_NAME=${MOODLE_SERVICE_NAME}
      - MOODLE_ADMIN_TOKEN=${MOODLE_ADMIN_TOKEN}
      - MOODLE_WS_TOKEN=${MOODLE_WS_TOKEN}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    networks:
      - myhr-net

  # Car Booking Module
  carbooking:
    build:
      context: .
      dockerfile: docker/Dockerfile.carbooking
    container_name: myhr-carbooking
    restart: always
    env_file:
      - .env
    volumes:
      - ./core:/var/www/html/core
      - ./Modules/CarBooking:/var/www/html/Modules/CarBooking
    depends_on:
      - db
      - redis
    networks:
      - myhr-net

  # Yearly Activity Module
  yearlyactivity:
    build:
      context: .
      dockerfile: docker/Dockerfile.yearlyactivity
    container_name: myhr-yearlyactivity
    restart: always
    env_file:
      - .env
    volumes:
      - ./core:/var/www/html/core
      - ./Modules/YearlyActivity:/var/www/html/Modules/YearlyActivity
    depends_on:
      - db
      - redis
    networks:
      - myhr-net

  # Dormitory Module
  dormitory:
    build:
      context: .
      dockerfile: docker/Dockerfile.dormitory
    container_name: myhr-dormitory
    restart: always
    environment:
      - REDIS_HOST=redis
      - TZ=Asia/Bangkok
    volumes:
      - ./.env:/var/www/html/.env
      - ./Modules/Dormitory:/var/www/html/Modules/Dormitory
      - ./core:/var/www/html/core
      - ./vendor:/var/www/html/vendor
    networks:
      - myhr-net

  # IGA Module
  iga:
    build:
      context: .
      dockerfile: docker/Dockerfile.iga
    container_name: myhr-iga
    restart: always
    environment:
      - REDIS_HOST=redis
      - TZ=Asia/Bangkok
    volumes:
      - ./.env:/var/www/html/.env
      - ./Modules/IGA:/var/www/html/Modules/IGA
      - ./core:/var/www/html/core
      - ./vendor:/var/www/html/vendor
    networks:
      - myhr-net

networks:
  myhr-net:
    driver: bridge

volumes:
  db_data:
    external: true
    name: dev_myhr-db-dev-data
  moodle_db_data:
  moodledata:

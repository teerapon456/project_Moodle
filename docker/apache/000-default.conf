<VirtualHost *:80>
    DocumentRoot /var/www/html/public
    
    # Alias for Modules (if needed by legacy code)
    Alias /Modules /var/www/html/Modules
    
    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
    </Directory>
    
    <Directory /var/www/html/Modules>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

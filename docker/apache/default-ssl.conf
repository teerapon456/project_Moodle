<IfModule mod_ssl.c>
    <VirtualHost _default_:443>
        DocumentRoot /var/www/html/public
        Alias /Modules /var/www/html/Modules
        Alias /moodle /var/www/html/Modules/Moodle/public
        
        SSLEngine on
        SSLCertificateFile /etc/apache2/ssl/server.crt
        SSLCertificateKeyFile /etc/apache2/ssl/server.key

        <Directory /var/www/html/public>
            AllowOverride All
            Require all granted
        </Directory>
        
        <Directory /var/www/html/Modules>
            AllowOverride All
            Require all granted
        </Directory>

        <Directory /var/www/html/Modules/Moodle/public>
            AllowOverride All
            Require all granted
            DirectoryIndex index.php index.html
        </Directory>

        ServerName localhost
    </VirtualHost>
</IfModule>

events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Upstream definitions
  upstream portal_upstream {
      server portal:80;
  }
  
  upstream moodle_upstream {
      server moodle:80;
  }

  upstream frontend_upstream {
      server frontend:3000;
  }

  upstream carbooking_upstream {
      server carbooking:80;
  }

  upstream dormitory_upstream {
      server dormitory:80;
  }

  upstream iga_upstream {
      server iga:80;
  }

  # WebSocket support for Next.js
  map $http_upgrade $connection_upgrade {
      default upgrade;
      ''      close;
  }

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 64M;

  # Redirect HTTP -> HTTPS (IGA + PMA)
  server {
    listen 80;
    server_name iga.inteqcgroup.com pma.inteqcgroup.com;
    return 301 https://$host$request_uri;
  }

  # IGA
  server {
    listen 443 ssl;
    server_name iga.inteqcgroup.com;

    ssl_certificate     /etc/nginx/certs/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/privkey.key;

    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_pass http://172.17.100.55:8088;
    }
  }

  # PMA
  server {
    listen 443 ssl;
    server_name pma.inteqcgroup.com;

    ssl_certificate     /etc/nginx/certs/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/privkey.key;

    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_pass http://172.17.100.55:8089;
    }
  }

  # MyHR Portal (Port 8090 -> 443)
  server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/privkey.key;

    # Moodle LMS
    location /moodle/ {
        proxy_pass http://moodle_upstream/moodle/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
    }
    
    location = /moodle {
        return 301 https://$http_host/moodle/;
    }

    # Main Portal
    location /public/ {
        proxy_pass http://portal_upstream/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /assets/ {
        proxy_pass http://portal_upstream/assets/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        proxy_pass http://portal_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # Moodle Frontend
    location /moodle-app {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
    }

    # Modules
    location /Modules/CarBooking {
        proxy_pass http://carbooking_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /Modules/Dormitory {
        proxy_pass http://dormitory_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /Modules/IGA {
        proxy_pass http://iga_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
  }
}

events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Upstream definitions
  upstream portal_upstream {
      server portal:80;
  }
  
  upstream moodle_upstream {
      server moodle:80;
  }

  upstream frontend_upstream {
      server frontend:3000;
  }

  upstream carbooking_upstream {
      server carbooking:80;
  }

  upstream yearlyactivity_upstream {
      server yearlyactivity:80;
  }

  upstream health_upstream {
      server health:80;
  }

  upstream dormitory_upstream {
      server dormitory:80;
  }

  upstream iga_upstream {
      server iga:80;
  }

  # WebSocket support for Next.js
  map $http_upgrade $connection_upgrade {
      default upgrade;
      ''      close;
  }

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 64M;

  # Redirect HTTP -> HTTPS (IGA + PMA)
  server {
    listen 80;
    server_name iga.inteqcgroup.com pma.inteqcgroup.com;
    return 301 https://$host$request_uri;
  }

  # IGA
  server {
    listen 443 ssl;
    server_name iga.inteqcgroup.com;

    ssl_certificate     /etc/nginx/certs/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/privkey.key;

    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_pass http://172.17.100.55:8088;
    }
  }

  # PMA
  server {
    listen 443 ssl;
    server_name pma.inteqcgroup.com;

    ssl_certificate     /etc/nginx/certs/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/privkey.key;

    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_pass http://172.17.100.55:8089;
    }
  }

  # MyHR Portal (Port 8090 -> 443)
  server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/privkey.key;

    # Moodle LMS
    location /moodle/ {
        proxy_pass http://moodle_upstream/moodle/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
    }
    
    location = /moodle {
        return 301 https://$http_host/moodle/;
    }

    # Dynamic Error Pages (Database-backed via Health Container)
    error_page 502 503 504 = @dynamic_502;
    
    location @dynamic_502 {
        rewrite ^ /health/502_dynamic.php break;
        proxy_pass http://health_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Original-URI $request_uri;
    }
    
    # Fallback to static HTML if Health container is ALSO down
    location = /502.html {
        root /usr/share/nginx/html;
        internal;
    }
    # Microsoft SSO Failover
    location /auth/ {
        proxy_pass http://portal_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_intercept_errors on;
        error_page 502 503 504 = @sso_failover;
    }

    location @sso_failover {
        rewrite ^/auth/microsoft/(.*)$ /health/sso_failover.php?action=$1 break;
        proxy_pass http://health_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
    }
    # Serve HRServices icons directly to prevent 502 when portal is down
    location /Modules/HRServices/public/assets/ {
        alias /var/www/html/Modules/HRServices/public/assets/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # System Health Dashboard - High Security (Restricted Access)
    location /health/ {
        # IP Whitelist for Admin/IT Network
        # allow 192.168.1.0/24; # Example: Office Network
        allow 127.0.0.1;      # Allow local
        # deny all;           # COMMENTED OUT FOR NOW - Allow user to verify first
        
        proxy_pass http://health_upstream/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # Yearly Activity Module
    location /Modules/YearlyActivity/ {
        proxy_pass http://yearlyactivity_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
    }

    # Main Portal
    location /public/ {
        proxy_pass http://portal_upstream/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_intercept_errors on;
    }

    # Static Assets serving directly from Nginx
    location /public/assets/ {
        root /var/www/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /assets/ {
        alias /var/www/html/public/assets/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Handle favicon explicitly to avoid 502 when portal is down
    location = /favicon.ico {
        alias /var/www/html/public/assets/images/brand/inteqc-logo.png;
        log_not_found off;
        access_log off;
    }

    location / {
        proxy_pass http://portal_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_intercept_errors on;
    }

    # Moodle Frontend
    location /moodle-app {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
    }

    # Modules
    location /Modules/CarBooking {
        proxy_pass http://carbooking_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /Modules/Dormitory {
        proxy_pass http://dormitory_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /Modules/IGA {
        proxy_pass http://iga_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
  }
}

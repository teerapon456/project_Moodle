events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  upstream portal_upstream {
      server portal:80;
  }
  upstream moodle_upstream {
      server moodle:80;
  }
  upstream frontend_upstream {
      server frontend:3000;
  }
  upstream carbooking_upstream {
      server carbooking:80;
  }
  upstream yearlyactivity_upstream {
      server yearlyactivity:80;
  }
  upstream health_upstream {
      server health:80;
  }
  upstream dormitory_upstream {
      server dormitory:80;
  }
  upstream iga_upstream {
      server iga:80;
  }
  upstream moodle_prd_upstream {
      server moodle-prd-app:80;
  }

  map $http_upgrade $connection_upgrade {
      default upgrade;
      ''      close;
  }

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 512M;

  # HTTP -> HTTPS redirect ทุก domain
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # IGA
  server {
    listen 443 ssl;
    server_name iga.inteqcgroup.com;
    ssl_certificate     /etc/nginx/certs/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/privkey.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    location / {
      proxy_pass http://172.17.100.55:8088;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # PMA
  server {
    listen 443 ssl;
    server_name pma.inteqcgroup.com;
    ssl_certificate     /etc/nginx/certs/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/privkey.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    location / {
      proxy_pass http://172.17.100.55:8089;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # DEV Moodle
  server {
    listen 443 ssl;
    server_name devmoodle.inteqcgroup.com;
    ssl_certificate     /etc/nginx/certs/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/privkey.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    client_max_body_size 512M;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    location / {
      proxy_pass http://moodle_upstream;
      proxy_set_header Host devmoodle.inteqcgroup.com;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Host devmoodle.inteqcgroup.com;
      proxy_set_header X-Forwarded-Port 443;
      proxy_http_version 1.1;
      proxy_redirect off;
      proxy_read_timeout 300s;
      proxy_buffering off;
    }
  }

  # PRD Moodle (ILLDC)
  server {
    listen 443 ssl;
    server_name illdc.inteqcgroup.com;
    ssl_certificate     /etc/nginx/certs/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/privkey.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    client_max_body_size 512M;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    location / {
      proxy_pass http://moodle_prd_upstream;
      proxy_set_header Host illdc.inteqcgroup.com;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Host illdc.inteqcgroup.com;
      proxy_set_header X-Forwarded-Port 443;
      proxy_http_version 1.1;
      proxy_redirect off;
      proxy_read_timeout 300s;
      proxy_buffering off;
    }
  }

  # MyHR Portal
  server {
    listen 443 ssl default_server;
    server_name myhr.inteqcgroup.com _;
    ssl_certificate     /etc/nginx/certs/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/privkey.key;
    recursive_error_pages on;

    location /moodle/ {
        proxy_pass http://moodle_upstream/moodle/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
    }
    location = /moodle {
        return 301 https://$http_host/moodle/;
    }
    error_page 502 503 504 = @dynamic_502;
    location @dynamic_502 {
        rewrite ^(.*)$ /502_dynamic.php break;
        proxy_pass http://health_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Original-URI $request_uri;
        proxy_intercept_errors on;
        error_page 404 502 503 504 = /502.html;
    }
    location = /502.html {
        root /usr/share/nginx/html;
        internal;
    }
    location /auth/ {
        proxy_pass http://portal_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_intercept_errors on;
        error_page 502 503 504 = @sso_failover;
    }
    location @sso_failover {
        rewrite ^/auth/microsoft/(.*)$ /health/sso_failover.php?action=$1 break;
        proxy_pass http://health_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
    }
    location /Modules/HRServices/public/assets/ {
        alias /var/www/html/Modules/HRServices/public/assets/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    location /health/ {
        proxy_pass http://health_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
    }
    location /Modules/YearlyActivity/ {
        proxy_pass http://yearlyactivity_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
    }
    location /public/assets/ {
        root /var/www/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    location /assets/ {
        alias /var/www/html/public/assets/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    location = /favicon.ico {
        alias /var/www/html/public/assets/images/brand/inteqc-logo.png;
        log_not_found off;
        access_log off;
    }
    location /moodle-app {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
    }
    location /Modules/CarBooking {
        proxy_pass http://carbooking_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location /Modules/Dormitory/ {
        proxy_pass http://dormitory_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
    }
    location /Modules/IGA/ {
        proxy_pass http://iga_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
    }
    location / {
        proxy_pass http://portal_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_intercept_errors on;
    }
  }
}

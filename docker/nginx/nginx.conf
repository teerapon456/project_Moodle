events {}

http {
    # Upstream definitions
    upstream portal_upstream {
        server portal:80;
    }
    
    upstream moodle_upstream {
        server moodle:80;
    }

    upstream frontend_upstream {
        server frontend:3000;
    }

    upstream carbooking_upstream {
        server carbooking:80;
    }

    upstream dormitory_upstream {
        server dormitory:80;
    }

    # WebSocket support for Next.js
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 443 ssl;
        server_name localhost;
# ... (rest of server block) -> I need to be careful with replace chunks.
# The map must be in http block, outside server.
# The proxy_set_header must use the variable.


        ssl_certificate /etc/nginx/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/selfsigned.key;

        # Moodle LMS - /moodle path (keep full URI)
        location /moodle/ {
            proxy_pass http://moodle_upstream/moodle/;
            proxy_set_header Host $host:8080;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host:8080;
            proxy_redirect off;
        }
        
        location = /moodle {
            return 301 https://$host:8080/moodle/;
        }

        # Main Portal - default
        location /public/ {
            proxy_pass http://carbooking_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://portal_upstream;
            proxy_set_header Host $host:8080;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Moodle Frontend (Next.js)
        location /moodle-app {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for Next.js
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_cache_bypass $http_upgrade;
        }

        # Car Booking Module
        location /Modules/CarBooking {
            proxy_pass http://carbooking_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Dormitory Module
        location /Modules/Dormitory {
            proxy_pass http://dormitory_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
